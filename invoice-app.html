<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Invoice & Quote Book</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FEFCE8;
    --paper-dark: #F5F0C0;
    --ink: #2D2D7A;
    --ink-light: #4A4AA8;
    --ink-faint: #8888CC;
    --red: #C0392B;
    --line: #9999CC;
    --line-light: #C8C8E8;
    --shadow: rgba(45,45,122,0.12);
    /* Quote mode overrides */
    --quote-ink: #1A5C3A;
    --quote-ink-light: #2E7D52;
    --quote-ink-faint: #7AB898;
    --quote-accent: #C47A00;
    --quote-line: #7AB898;
    --quote-line-light: #B8DDC8;
    --quote-paper: #F0FBF4;
    --quote-paper-dark: #D4EEDC;
  }

  /* ── Quote mode theming ── */
  body.quote-mode { background: #D4E8D8; }
  body.quote-mode .paper {
    background: var(--quote-paper);
    border-color: #A8C8B0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 8px 32px rgba(26,92,58,0.15), inset 0 0 60px rgba(180,240,200,0.2);
  }
  body.quote-mode .paper::before {
    background: linear-gradient(to right, #6BA87A, #90C8A0);
    border-right-color: #5A9068;
  }
  body.quote-mode .invoice-title {
    color: var(--quote-ink);
    border-color: var(--quote-ink);
  }
  body.quote-mode .meta-row,
  body.quote-mode .from-to-row,
  body.quote-mode .abn-row,
  body.quote-mode .items-table,
  body.quote-mode .bottom-row { border-color: var(--quote-ink); }
  body.quote-mode .meta-cell  { border-right-color: var(--quote-ink); }
  body.quote-mode .address-cell { border-right-color: var(--quote-ink); }
  body.quote-mode .abn-cell   { border-right-color: var(--quote-ink); }
  body.quote-mode .sig-cell   { border-right-color: var(--quote-ink); }
  body.quote-mode .meta-label { color: var(--quote-ink); }
  body.quote-mode .meta-input { color: var(--quote-ink); }
  body.quote-mode .items-table th { color: var(--quote-ink); background: var(--quote-paper-dark); }
  body.quote-mode .items-table td { border-color: var(--quote-line-light); }
  body.quote-mode .invoice-prefix { color: var(--quote-ink-light); }
  body.quote-mode .invoice-number-val { color: var(--quote-accent); }
  body.quote-mode .total-row.grand { background: var(--quote-paper-dark); }
  body.quote-mode .total-row.grand .total-value { color: var(--quote-accent); }
  body.quote-mode .total-label { color: var(--quote-ink); }
  body.quote-mode .total-value { color: var(--quote-ink); }
  body.quote-mode .total-row { border-bottom-color: var(--quote-line-light); }
  body.quote-mode .total-label { color: var(--quote-ink); }
  body.quote-mode .gst-row    { border-color: var(--quote-ink); }
  body.quote-mode .original-copy { color: var(--quote-ink-faint); }
  body.quote-mode .add-row-btn { border-color: var(--quote-ink-faint); color: var(--quote-ink-faint); }
  body.quote-mode .add-row-btn:hover { color: var(--quote-ink); }
  body.quote-mode .sig-clear { color: var(--quote-ink); border-color: var(--quote-ink); }
  body.quote-mode .taxable-note { color: var(--quote-ink-faint); }

  /* Quote watermark diagonal strip */
  body.quote-mode .paper::after {
    content: 'QUOTE · NOT A TAX INVOICE · QUOTE · NOT A TAX INVOICE · QUOTE · NOT A TAX INVOICE';
    position: absolute;
    top: 50%; left: -60%;
    width: 220%;
    transform: translateY(-50%) rotate(-30deg);
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(26,92,58,0.07);
    pointer-events: none;
    white-space: nowrap;
    z-index: 0;
  }
  .paper > * { position: relative; z-index: 1; }

  /* ── Mode toggle pill ── */
  .mode-toggle {
    display: flex;
    background: rgba(0,0,0,0.12);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .mode-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: none;
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.6);
  }
  .mode-btn.active {
    color: #fff;
    background: rgba(255,255,255,0.22);
  }
  .mode-btn.active.quote-active { background: #2E7D52; }
  .mode-btn.active.inv-active   { background: var(--ink); }

  /* Convert banner */
  .convert-banner {
    display: none;
    width: 100%;
    max-width: 820px;
    background: linear-gradient(135deg, #1A5C3A 0%, #2E7D52 100%);
    border-radius: 0 0 10px 10px;
    padding: 14px 20px;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .convert-banner.visible { display: flex; }
  .convert-text {
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.3px;
  }
  .convert-text strong { color: #fff; font-size: 14px; }
  .btn-convert {
    background: #fff;
    color: #1A5C3A;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-convert:active { transform: scale(0.96); }

  /* Status badge in saved list */
  .status-badge {
    display: inline-block;
    font-family: 'Inconsolata', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-quote   { background: #D4EEDC; color: #1A5C3A; border: 1px solid #90C8A0; }
  .badge-invoice { background: #E0E0F8; color: #2D2D7A; border: 1px solid #9999CC; }
  .badge-converted { background: #FFF3E0; color: #C47A00; border: 1px solid #F0C060; }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #E8E4D0;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    margin: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 2px,
      rgba(160,150,100,0.04) 2px,
      rgba(160,150,100,0.04) 4px
    );
  }

  /* ── Top toolbar ── */
  .toolbar {
    width: 100%;
    max-width: 820px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px 14px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar-title {
    font-family: 'IM Fell English', serif;
    font-size: 18px;
    color: #4A3F00;
    letter-spacing: 0.3px;
  }
  .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn-new    { background: var(--ink); color: #fff; }
  .btn-pdf    { background: var(--red); color: #fff; }
  .btn-save   { background: #2E7D32; color: #fff; }

  /* ── Paper ── */
  .paper {
    width: 100%;
    max-width: 820px;
    background: var(--paper);
    border: 1px solid #C8C0A0;
    box-shadow:
      0 2px 6px rgba(0,0,0,0.08),
      0 8px 32px rgba(0,0,0,0.12),
      inset 0 0 60px rgba(255,245,180,0.3);
    padding: 28px 32px 32px;
    position: relative;
  }

  /* Left binding edge */
  .paper::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: linear-gradient(to right, #B8A870, #D4C888);
    border-right: 1px solid #A09050;
  }

  /* ── Sections ── */
  .original-copy {
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .invoice-title {
    font-family: 'IM Fell English', serif;
    font-size: 28px;
    color: var(--ink);
    text-align: center;
    letter-spacing: 1px;
    border: 2px solid var(--ink);
    padding: 8px 16px;
    margin-bottom: 16px;
  }

  /* Logo area */
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 16px;
  }
  .logo-box {
    width: 120px;
    height: 70px;
    border: 1.5px dashed var(--ink-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .logo-box img { width: 100%; height: 100%; object-fit: contain; }
  .logo-placeholder {
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
    line-height: 1.5;
    font-family: 'Inconsolata', monospace;
  }
  .logo-box input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .company-details {
    flex: 1;
    text-align: right;
  }
  .company-details input {
    display: block;
    width: 100%;
    text-align: right;
    border: none;
    background: transparent;
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    padding: 2px 4px;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    outline: none;
  }
  .company-details input:focus { border-bottom-color: var(--ink-faint); }
  .company-name-input {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }
  .company-sub-input { font-size: 12px; color: var(--ink-light); }

  /* ── Top metadata row ── */
  .meta-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1.4fr;
    border: 1.5px solid var(--ink);
    margin-bottom: 0;
  }
  .meta-cell {
    border-right: 1.5px solid var(--ink);
    padding: 6px 10px;
    min-height: 54px;
  }
  .meta-cell:last-child { border-right: none; }
  .meta-label {
    font-family: 'Inconsolata', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--ink);
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }
  .meta-input {
    border: none;
    background: transparent;
    font-family: 'Inconsolata', monospace;
    font-size: 15px;
    color: var(--ink);
    width: 100%;
    outline: none;
    padding: 0;
  }
  .invoice-number-display {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .invoice-prefix {
    font-family: 'Inconsolata', monospace;
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 1px;
  }
  .invoice-number-val {
    font-family: 'Inconsolata', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 1px;
  }

  /* ── FROM / TO ── */
  .from-to-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1.5px solid var(--ink);
    border-top: none;
  }
  .address-cell {
    padding: 8px 10px;
    min-height: 80px;
    border-right: 1.5px solid var(--ink);
  }
  .address-cell:last-child { border-right: none; }
  .address-textarea {
    border: none;
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: var(--ink);
    width: 100%;
    height: 64px;
    outline: none;
    resize: none;
    line-height: 1.6;
    padding: 2px 0;
  }

  .abn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1.5px solid var(--ink);
    border-top: none;
  }
  .abn-cell {
    padding: 5px 10px;
    border-right: 1.5px solid var(--ink);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .abn-cell:last-child { border-right: none; }
  .abn-cell .meta-label { margin-bottom: 0; white-space: nowrap; }
  .abn-input {
    border: none;
    background: transparent;
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    color: var(--ink);
    flex: 1;
    outline: none;
  }

  .gst-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1.5px solid var(--ink);
    border-top: none;
    padding: 4px 10px;
    margin-bottom: 14px;
  }
  .gst-row .meta-label { margin-bottom: 0; }
  .gst-input {
    border: none;
    background: transparent;
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    width: 180px;
  }
  .nz-note {
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    font-style: italic;
  }

  /* ── Line items table ── */
  .items-table {
    width: 100%;
    border-collapse: collapse;
    border: 1.5px solid var(--ink);
    margin-bottom: 0;
  }
  .items-table th {
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--ink);
    text-transform: uppercase;
    background: var(--paper-dark);
    border: 1px solid var(--line);
    padding: 7px 8px;
    text-align: center;
  }
  .items-table th.desc { text-align: left; }
  .items-table td {
    border: 1px solid var(--line-light);
    padding: 0;
    height: 36px;
  }
  .items-table td input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    font-family: 'Inconsolata', monospace;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    padding: 0 8px;
    text-align: center;
  }
  .items-table td input.desc-input { text-align: left; }
  .items-table td input:focus { background: rgba(45,45,122,0.04); }
  .items-table tr:nth-child(even) td { background: rgba(200,200,232,0.08); }
  .col-qty   { width: 60px; }
  .col-desc  { width: auto; }
  .col-each  { width: 90px; }
  .col-gst   { width: 70px; }
  .col-total { width: 100px; }
  .total-cell { font-weight: 700; color: var(--ink); }

  /* Add row button */
  .add-row-btn {
    width: 100%;
    border: 1px dashed var(--ink-faint);
    border-top: none;
    background: transparent;
    color: var(--ink-faint);
    font-family: 'Inconsolata', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .add-row-btn:hover { background: rgba(45,45,122,0.04); color: var(--ink); }

  /* ── Bottom section: sig + totals ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 220px;
    border: 1.5px solid var(--ink);
    border-top: 1.5px solid var(--ink);
  }

  .sig-cell {
    padding: 10px;
    border-right: 1.5px solid var(--ink);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sig-label {
    font-family: 'Inconsolata', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--ink);
    text-transform: uppercase;
  }
  #sig-canvas {
    border: 1px dashed var(--line);
    border-radius: 4px;
    background: rgba(255,255,255,0.6);
    cursor: crosshair;
    touch-action: none;
    display: block;
  }
  .sig-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .sig-clear {
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    color: var(--red);
    background: none;
    border: 1px solid var(--red);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .taxable-note {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    color: var(--ink-faint);
    font-style: italic;
    margin-top: auto;
  }

  .totals-cell { display: flex; flex-direction: column; }
  .total-row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--line-light);
    height: 38px;
  }
  .total-row:last-child { border-bottom: none; height: auto; min-height: 50px; }
  .total-label {
    flex: 1;
    font-family: 'Inconsolata', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--ink);
    text-transform: uppercase;
    padding: 6px 10px;
  }
  .total-value {
    width: 90px;
    font-family: 'Inconsolata', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    text-align: right;
    padding: 6px 10px;
    border-left: 1px solid var(--line);
  }
  .total-row.grand { background: var(--paper-dark); }
  .total-row.grand .total-label { font-size: 10px; line-height: 1.3; padding: 8px 10px; }
  .total-row.grand .total-value { font-size: 17px; color: var(--red); }

  /* ── Saved invoices drawer ── */
  .drawer-toggle {
    width: 100%;
    max-width: 820px;
    margin-top: 16px;
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 12px 20px;
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .saved-drawer {
    width: 100%;
    max-width: 820px;
    background: #fff;
    border: 1px solid #C8C0A0;
    display: none;
    padding: 16px;
    gap: 10px;
    flex-direction: column;
  }
  .saved-drawer.open { display: flex; }
  .saved-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--paper);
    border: 1px solid var(--line-light);
    border-radius: 6px;
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    color: var(--ink);
  }
  .saved-item-meta { color: var(--ink-faint); font-size: 11px; }
  .saved-load { background: var(--ink); color: #fff; border: none; border-radius: 4px; padding: 4px 10px; font-size: 11px; font-family: 'Inconsolata', monospace; cursor: pointer; }
  .saved-delete { background: none; border: none; color: var(--red); font-size: 16px; cursor: pointer; margin-left: 8px; }
  .empty-saved { color: var(--ink-faint); font-size: 13px; text-align: center; padding: 20px; font-family: 'Inconsolata', monospace; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 12px 24px;
    border-radius: 999px;
    font-family: 'Inconsolata', monospace;
    font-size: 13px;
    letter-spacing: 0.5px;
    transition: transform 0.3s ease;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Login screen overlay ── */
  html, body { height: 100%; }

  .login-overlay {
    width: 100%;
    min-height: 100vh;
    background: #E8E4D0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    background-image: repeating-linear-gradient(
      45deg, transparent, transparent 2px,
      rgba(160,150,100,0.04) 2px, rgba(160,150,100,0.04) 4px
    );
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    background: #FEFCE8;
    background: var(--paper, #FEFCE8);
    border: 1px solid #C8C0A0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    padding: 40px 36px 36px;
    max-width: 380px; width: 90%;
    text-align: center;
    position: relative;
  }
  .login-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
    background: linear-gradient(to right, #B8A870, #D4C888);
    border-right: 1px solid #A09050;
  }
  .login-logo-title {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 24px; color: #2D2D7A;
    border: 2px solid #2D2D7A;
    padding: 8px 12px; margin-bottom: 6px;
  }
  .login-sub {
    font-family: 'Inconsolata', 'Courier New', monospace;
    font-size: 11px; letter-spacing: 1.5px;
    color: #8888CC; text-transform: uppercase;
    margin-bottom: 30px;
  }
  .login-btn {
    width: 100%; padding: 13px 20px; margin-bottom: 12px;
    border-radius: 8px; border: none; cursor: pointer;
    font-family: 'Lato', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 0.3px; transition: all 0.15s; display: flex;
    align-items: center; justify-content: center; gap: 10px;
  }
  .login-btn:active { transform: scale(0.97); }
  .login-btn-google { background: #fff; color: #3c4043; border: 1.5px solid #dadce0; }
  .login-btn-google:hover { background: #f8f9fa; }
  .login-divider {
    font-family: 'Inconsolata', monospace; font-size: 11px;
    color: var(--ink-faint); letter-spacing: 2px;
    margin: 16px 0; position: relative;
  }
  .login-divider::before, .login-divider::after {
    content: ''; position: absolute; top: 50%;
    width: 38%; height: 1px; background: var(--line-light);
  }
  .login-divider::before { left: 0; }
  .login-divider::after  { right: 0; }
  .login-input {
    width: 100%; padding: 11px 14px; margin-bottom: 10px;
    border: 1.5px solid var(--line); border-radius: 6px;
    font-family: 'Inconsolata', monospace; font-size: 14px;
    color: var(--ink); background: transparent; outline: none;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--ink); }
  .login-btn-email { background: var(--ink); color: #fff; }
  .login-btn-email:hover { background: var(--ink-light); }
  .login-switch {
    font-family: 'Inconsolata', monospace; font-size: 12px;
    color: var(--ink-faint); margin-top: 14px; cursor: pointer;
  }
  .login-switch span { color: var(--ink); text-decoration: underline; cursor: pointer; }
  .login-error {
    font-family: 'Inconsolata', monospace; font-size: 12px;
    color: var(--red); margin-bottom: 10px; min-height: 16px;
  }

  /* ── User bar in toolbar ── */
  .user-bar {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Inconsolata', monospace; font-size: 12px;
    color: #4A3F00;
  }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .user-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-signout {
    padding: 5px 10px; border-radius: 6px;
    background: transparent; border: 1px solid #C8A060;
    font-family: 'Inconsolata', monospace; font-size: 11px;
    color: #4A3F00; cursor: pointer; letter-spacing: 0.5px;
  }
  .btn-signout:hover { background: rgba(0,0,0,0.06); }

  /* ── Sync indicator ── */
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #aaa; display: inline-block; margin-left: 4px;
    transition: background 0.3s;
  }
  .sync-dot.syncing { background: #F0C060; }
  .sync-dot.synced  { background: #4CAF50; }

  /* ── Print / PDF styles ── */
  @media print {
    body { background: none; padding: 0; }
    .toolbar, .drawer-toggle, .saved-drawer, .add-row-btn, .sig-clear, .sig-controls button, .toast { display: none !important; }
    .paper { box-shadow: none; border: none; max-width: 100%; }
    .paper::before { display: none; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .paper { padding: 20px 18px 24px; }
    .meta-row { grid-template-columns: 1fr 1fr; }
    .meta-row .invoice-number-cell { grid-column: 1 / -1; border-top: 1.5px solid var(--ink); border-right: none; }
    .invoice-title { font-size: 20px; }
    .col-gst { display: none; }
    .items-table th.gst-col { display: none; }
  }

  /* ── Send / Share modal ── */
  .modal-backdrop {
    display: none; position: absolute; inset: 0; z-index: 8000;
    min-height: 100vh;
    background: rgba(30,28,20,0.55);
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--paper); border: 1px solid #C8C0A0;
    box-shadow: 0 12px 48px rgba(0,0,0,0.22);
    padding: 32px 28px 28px; max-width: 440px; width: 92%;
    position: relative; border-radius: 2px;
  }
  .modal::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
    background: linear-gradient(to right, #B8A870, #D4C888);
    border-right: 1px solid #A09050;
  }
  .modal-title {
    font-family: 'IM Fell English', serif; font-size: 20px;
    color: var(--ink); margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-close {
    background: none; border: none; font-size: 20px; cursor: pointer;
    color: var(--ink-faint); line-height: 1; padding: 0 4px;
  }
  .modal-label {
    font-family: 'Inconsolata', monospace; font-size: 10px;
    font-weight: 700; letter-spacing: 1.2px; color: var(--ink);
    text-transform: uppercase; display: block; margin-bottom: 6px;
  }
  .modal-input {
    width: 100%; padding: 11px 14px; margin-bottom: 16px;
    border: 1.5px solid var(--line); border-radius: 6px;
    font-family: 'Inconsolata', monospace; font-size: 14px;
    color: var(--ink); background: transparent; outline: none;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--ink); }
  .modal-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-send-email {
    padding: 13px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.4px; transition: all 0.15s; text-align: center;
    background: var(--ink); color: #fff; display: flex;
    align-items: center; justify-content: center; gap: 8px;
  }
  .btn-send-email:active { transform: scale(0.97); }
  .btn-whatsapp {
    padding: 13px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.4px; transition: all 0.15s; text-align: center;
    background: #25D366; color: #fff; display: flex;
    align-items: center; justify-content: center; gap: 8px;
  }
  .btn-whatsapp:active { transform: scale(0.97); }
  .btn-download-pdf {
    padding: 13px 20px; border-radius: 8px; cursor: pointer;
    font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.4px; transition: all 0.15s; text-align: center;
    background: transparent; color: var(--red); border: 1.5px solid var(--red);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-download-pdf:active { transform: scale(0.97); }
  .modal-divider {
    border: none; border-top: 1px solid var(--line-light); margin: 4px 0 12px;
  }
  .emailjs-note {
    font-family: 'Inconsolata', monospace; font-size: 11px;
    color: var(--ink-faint); text-align: center; margin-top: 12px;
    line-height: 1.5;
  }
  .emailjs-note a { color: var(--ink-light); }

  /* ── Payment status badge on toolbar area ── */
  .status-strip {
    width: 100%; max-width: 820px;
    display: flex; align-items: center; gap: 10px;
    padding: 0 0 10px; flex-wrap: wrap;
  }
  .status-label {
    font-family: 'Inconsolata', monospace; font-size: 11px;
    letter-spacing: 1px; color: #6A5F30; text-transform: uppercase;
  }
  .status-pill {
    padding: 5px 14px; border-radius: 999px; border: none; cursor: pointer;
    font-family: 'Inconsolata', monospace; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s;
    opacity: 0.45;
  }
  .status-pill.active { opacity: 1; transform: scale(1.05); }
  .status-pill.unpaid  { background: #FEF3C7; color: #92400E; border: 1.5px solid #F59E0B; }
  .status-pill.paid    { background: #D1FAE5; color: #065F46; border: 1.5px solid #10B981; }
  .status-pill.overdue { background: #FEE2E2; color: #991B1B; border: 1.5px solid #EF4444; }

  /* ── PDF generation loading overlay ── */
  .pdf-loading {
    display: none; position: absolute; inset: 0; z-index: 9000;
    min-height: 100vh;
    background: rgba(30,28,20,0.7);
    align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  .pdf-loading.show { display: flex; }
  .pdf-spinner {
    width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pdf-loading-text {
    font-family: 'Inconsolata', monospace; font-size: 13px;
    letter-spacing: 1px; color: #fff;
  }

  .app-shell { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0 60px; }
  .app-shell.hidden { display: none; }
  @media print {
    .status-strip, .modal-backdrop, .pdf-loading, .btn-send { display: none !important; }
  }
</head>
<body>

<!-- ══ LOGIN OVERLAY ══ (hidden - no auth required) -->
<div class="login-overlay hidden" id="login-overlay"></div>

<!-- ══ MAIN APP ══ -->
<div class="app-shell" id="app-shell">

<!-- Toolbar -->
<div class="toolbar">
  <span class="toolbar-title">📋 Receipt Book <span class="sync-dot" id="sync-dot"></span></span>
  <div class="mode-toggle">
    <button class="mode-btn active inv-active" id="btn-mode-invoice" onclick="setMode('invoice')">INVOICE</button>
    <button class="mode-btn quote-active"      id="btn-mode-quote"   onclick="setMode('quote')">QUOTE</button>
  </div>
  <div class="toolbar-actions">
    <div class="user-bar" id="user-bar" style="display:none"></div>
    <button class="btn btn-new" onclick="newInvoice()">+ New</button>
    <button class="btn btn-save" onclick="saveInvoice()">💾 Save</button>
    <button class="btn btn-send" onclick="openSendModal()" style="background:#1565C0;color:#fff;">✉ Send</button>
    <button class="btn btn-pdf" onclick="window.print()">🖨 Print</button>
  </div>
</div>

<!-- Payment status strip -->
<div class="status-strip" id="status-strip">
  <span class="status-label">Payment:</span>
  <button class="status-pill unpaid  active" id="pill-unpaid"  onclick="setPayStatus('unpaid')">Unpaid</button>
  <button class="status-pill paid"           id="pill-paid"    onclick="setPayStatus('paid')">✓ Paid</button>
  <button class="status-pill overdue"        id="pill-overdue" onclick="setPayStatus('overdue')">⚠ Overdue</button>
</div>

<!-- ══ SEND / SHARE MODAL ══ -->
<div class="modal-backdrop" id="send-modal">
  <div class="modal">
    <div class="modal-title">
      Send Invoice
      <button class="modal-close" onclick="closeSendModal()">✕</button>
    </div>

    <label class="modal-label">Recipient email</label>
    <input class="modal-input" id="send-email" type="email" placeholder="client@example.com">

    <label class="modal-label">Subject line</label>
    <input class="modal-input" id="send-subject" type="text" placeholder="Invoice JP000001 from Your Company">

    <label class="modal-label">Message (optional)</label>
    <input class="modal-input" id="send-message" type="text" placeholder="Please find your invoice attached.">

    <hr class="modal-divider">
    <div class="modal-actions">
      <button class="btn-send-email" onclick="sendByEmail()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        Send via Email
      </button>
      <button class="btn-whatsapp" onclick="sendByWhatsApp()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.949 0C5.394 0 0 5.394 0 11.949c0 2.112.553 4.088 1.515 5.812L0 24l6.435-1.495a11.89 11.89 0 005.514 1.364h.001C18.505 23.869 24 18.474 24 11.919 24 5.394 18.505 0 11.949 0zm.001 21.812a9.864 9.864 0 01-5.031-1.377l-.361-.214-3.741.981.998-3.648-.235-.374A9.86 9.86 0 012.088 11.95c0-5.445 4.427-9.873 9.862-9.873 5.436 0 9.863 4.428 9.863 9.873 0 5.445-4.427 9.862-9.863 9.862z"/></svg>
        Share via WhatsApp
      </button>
      <button class="btn-download-pdf" onclick="downloadPDF()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </button>
    </div>

    <div class="emailjs-note">
      Email uses <a href="https://emailjs.com" target="_blank">EmailJS</a> (free · 200 emails/month).<br>
      Add your EmailJS keys in the EMAILJS_CONFIG section of the code.
    </div>
  </div>
</div>

<!-- ══ PDF LOADING OVERLAY ══ -->
<div class="pdf-loading" id="pdf-loading">
  <div class="pdf-spinner"></div>
  <div class="pdf-loading-text" id="pdf-loading-text">Generating PDF…</div>
</div>

<!-- Paper invoice -->
<div class="paper" id="invoice">

  <div class="original-copy" id="doc-copy-label">Original Copy</div>
  <div class="invoice-title" id="doc-title">Tax Invoice / Statement</div>

  <!-- Logo + Company -->
  <div class="logo-row">
    <div class="logo-box" title="Tap to upload logo">
      <div class="logo-placeholder" id="logo-placeholder">TAP TO<br>ADD LOGO</div>
      <img id="logo-img" style="display:none" alt="logo">
      <input type="file" accept="image/*" onchange="loadLogo(this)">
    </div>
    <div class="company-details">
      <input class="meta-input company-name-input" id="co-name" type="text" placeholder="Your Company Name" value="">
      <input class="meta-input company-sub-input" id="co-abn-top" type="text" placeholder="ABN: XX XXX XXX XXX" value="">
      <input class="meta-input company-sub-input" id="co-addr" type="text" placeholder="Address, City, State" value="">
      <input class="meta-input company-sub-input" id="co-phone" type="text" placeholder="Phone / Email" value="">
    </div>
  </div>

  <!-- Date / Order / Invoice No -->
  <div class="meta-row">
    <div class="meta-cell">
      <span class="meta-label">Date</span>
      <input class="meta-input" type="date" id="inv-date">
    </div>
    <div class="meta-cell">
      <span class="meta-label">Order Number</span>
      <input class="meta-input" id="inv-order" type="text" placeholder="—">
    </div>
    <div class="meta-cell invoice-number-cell">
      <span class="meta-label">Tax Invoice Number</span>
      <div class="invoice-number-display">
        <span class="invoice-prefix" id="inv-prefix">JP</span>
        <span class="invoice-number-val" id="inv-num">000001</span>
      </div>
    </div>
  </div>

  <!-- FROM / TO -->
  <div class="from-to-row">
    <div class="address-cell">
      <span class="meta-label">From</span>
      <textarea class="address-textarea" id="from-addr" placeholder="Your name / business&#10;Street address&#10;City, State, Postcode"></textarea>
    </div>
    <div class="address-cell">
      <span class="meta-label">To</span>
      <textarea class="address-textarea" id="to-addr" placeholder="Client name / business&#10;Street address&#10;City, State, Postcode"></textarea>
    </div>
  </div>

  <!-- ABN row -->
  <div class="abn-row">
    <div class="abn-cell">
      <span class="meta-label">ABN (Supplier):</span>
      <input class="abn-input" id="abn-supplier" type="text" placeholder="XX XXX XXX XXX">
    </div>
    <div class="abn-cell">
      <span class="meta-label">ABN (Recipient):</span>
      <input class="abn-input" id="abn-recipient" type="text" placeholder="XX XXX XXX XXX">
    </div>
  </div>

  <!-- GST No row -->
  <div class="gst-row">
    <span class="meta-label">GST No:</span>
    <input class="gst-input" id="gst-no" type="text" placeholder="Enter GST number">
    <span class="nz-note">(New Zealand Only)</span>
  </div>

  <!-- Line items -->
  <table class="items-table" id="items-table">
    <thead>
      <tr>
        <th class="col-qty">QTY</th>
        <th class="col-desc desc">Description</th>
        <th class="col-each">Each $</th>
        <th class="col-gst gst-col">GST</th>
        <th class="col-total">Total $</th>
      </tr>
    </thead>
    <tbody id="items-body">
      <!-- rows injected by JS -->
    </tbody>
  </table>
  <button class="add-row-btn" onclick="addRow()">+ ADD LINE ITEM</button>

  <!-- Bottom: signature + totals -->
  <div class="bottom-row">
    <div class="sig-cell">
      <span class="sig-label">Signed:</span>
      <canvas id="sig-canvas" width="420" height="100"></canvas>
      <div class="sig-controls">
        <button class="sig-clear" onclick="clearSig()">✕ Clear</button>
        <span style="font-family:Inconsolata,monospace;font-size:10px;color:var(--ink-faint)">Sign with stylus or finger</span>
      </div>
      <div class="taxable-note">* Indicates taxable supply &nbsp;|&nbsp; Spirax 565</div>
    </div>
    <div class="totals-cell">
      <div class="total-row">
        <span class="total-label">Sub Total</span>
        <span class="total-value" id="subtotal">0.00</span>
      </div>
      <div class="total-row">
        <span class="total-label">GST (10%)</span>
        <span class="total-value" id="gst-total">0.00</span>
      </div>
      <div class="total-row grand">
        <span class="total-label">Total Inclusive<br>of GST</span>
        <span class="total-value" id="grand-total">0.00</span>
      </div>
    </div>
  </div>

</div><!-- /paper -->

<!-- Convert to Invoice banner (shows only in quote mode after saving) -->
<div class="convert-banner" id="convert-banner">
  <div class="convert-text">
    <strong>This is a Quote</strong> — once the client approves, convert it to a Tax Invoice with one tap.
  </div>
  <button class="btn-convert" onclick="convertToInvoice()">⚡ Convert to Invoice</button>
</div>

<!-- Saved invoices -->
<button class="drawer-toggle" onclick="toggleDrawer()">
  <span>📁 Saved Invoices</span>
  <span id="drawer-arrow">▼</span>
</button>
<div class="saved-drawer" id="saved-drawer">
  <div id="saved-list"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

</div><!-- /app-shell -->

<script>
// ── No-auth mode: app runs fully offline with localStorage ──
let auth = null, db = null;
let currentUser      = { uid: 'local' }; // always "logged in" locally
let currentInvoiceId = null;
let docType          = 'invoice';
let isSignUpMode     = false;
const GST_RATE       = 0.1;

// Boot the app immediately — don't wait for external scripts
let _appBooted = false;
function bootApp() {
  if (_appBooted) return;
  _appBooted = true;
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  appInit();
}
document.addEventListener('DOMContentLoaded', bootApp);
window.addEventListener('load', bootApp);

// ── Mode switching ─────────────────────────────────────
function setMode(mode, silent) {
  docType = mode;
  const isQuote = mode === 'quote';
  document.body.classList.toggle('quote-mode', isQuote);
  document.getElementById('btn-mode-invoice').classList.toggle('active', !isQuote);
  document.getElementById('btn-mode-quote').classList.toggle('active', isQuote);
  document.getElementById('doc-title').textContent   = isQuote ? 'Quote / Estimate' : 'Tax Invoice / Statement';
  document.getElementById('doc-copy-label').textContent = isQuote ? 'Original Copy — Quote' : 'Original Copy';
  document.getElementById('inv-prefix').textContent  = isQuote ? 'QT' : 'JP';
  // Only show convert banner if a quote is currently loaded/saved
  updateConvertBanner();
  if (!silent) generateDocNumber();
}

function updateConvertBanner() {
  const banner = document.getElementById('convert-banner');
  banner.classList.toggle('visible', docType === 'quote');
}

// ── App initialisation (called after login) ────────────

function appInit() {
  setTodayDate();
  setMode('invoice', true);
  generateDocNumber();
  if (!document.getElementById('items-body').children.length) {
    for (let i = 0; i < 8; i++) addRow();
  }
  initSignature();
  loadCompanyProfile();
  loadSavedList();
}

// Only run non-auth DOM setup on load
document.addEventListener('DOMContentLoaded', () => {
  // Items table and signature init before login completes
});

function setTodayDate() {
  const d = new Date();
  document.getElementById('inv-date').value = d.toISOString().split('T')[0];
}

function generateDocNumber() {
  // Uses cached list length for now; Firestore save will confirm
  const prefix = docType === 'quote' ? 'QT' : 'JP';
  document.getElementById('inv-prefix').textContent = prefix;
  // Number will be set properly on save; show placeholder
  if (!currentInvoiceId) {
    document.getElementById('inv-num').textContent = '------';
  }
}
function generateInvoiceNumber() { return generateDocNumber(); }

// ── Line items ─────────────────────────────────────────
function addRow(qty='', desc='', each='', gst='') {
  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-qty"><input type="number" min="0" step="0.01" placeholder="1" value="${qty}" class="qty-input" onchange="calcRow(this)" oninput="calcRow(this)"></td>
    <td class="col-desc"><input type="text" placeholder="Description of goods / services" value="${desc}" class="desc-input"></td>
    <td class="col-each"><input type="number" min="0" step="0.01" placeholder="0.00" value="${each}" class="each-input" onchange="calcRow(this)" oninput="calcRow(this)"></td>
    <td class="col-gst gst-col"><input type="text" readonly value="${gst}" class="gst-input-cell" style="color:var(--ink-faint)"></td>
    <td class="col-total total-cell"><input type="text" readonly value="${gst ? (parseFloat(each||0)*parseFloat(qty||0)+(parseFloat(gst||0))).toFixed(2) : ''}" class="total-input" style="font-weight:700"></td>
  `;
  tbody.appendChild(tr);

  // Enter key moves to next row
  tr.querySelectorAll('input').forEach((inp, i, arr) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const next = arr[i+1];
        if (next) next.focus();
        else { addRow(); tbody.lastChild.querySelector('input').focus(); }
      }
    });
  });
}

function calcRow(input) {
  const row = input.closest('tr');
  const qty  = parseFloat(row.querySelector('.qty-input').value)  || 0;
  const each = parseFloat(row.querySelector('.each-input').value) || 0;
  const sub  = qty * each;
  const gst  = sub * GST_RATE;
  const total = sub + gst;
  row.querySelector('.gst-input-cell').value  = gst  > 0 ? gst.toFixed(2)  : '';
  row.querySelector('.total-input').value     = total > 0 ? total.toFixed(2) : '';
  calcTotals();
}

function calcTotals() {
  let sub = 0;
  document.querySelectorAll('#items-body tr').forEach(row => {
    const qty  = parseFloat(row.querySelector('.qty-input').value)  || 0;
    const each = parseFloat(row.querySelector('.each-input').value) || 0;
    sub += qty * each;
  });
  const gst   = sub * GST_RATE;
  const grand = sub + gst;
  document.getElementById('subtotal').textContent   = sub.toFixed(2);
  document.getElementById('gst-total').textContent  = gst.toFixed(2);
  document.getElementById('grand-total').textContent = grand.toFixed(2);
}

// ── Signature canvas ───────────────────────────────────
function initSignature() {
  const canvas = document.getElementById('sig-canvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let lastX = 0, lastY = 0;

  // Resize canvas to fit
  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = Math.floor(rect.width - 20);
    if (w > 0) {
      canvas.width = w;
      canvas.height = 100;
    }
  }
  setTimeout(resizeCanvas, 100);
  window.addEventListener('resize', resizeCanvas);

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    ctx.beginPath();
    ctx.arc(lastX, lastY, 0.8, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a5e';
    ctx.fill();
  }

  function draw(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = '#1a1a5e';
    ctx.lineWidth = 1.8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }

  function stopDraw() { drawing = false; }

  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  draw);
  canvas.addEventListener('mouseup',    stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove',  draw,      { passive: false });
  canvas.addEventListener('touchend',   stopDraw);
}

function clearSig() {
  const canvas = document.getElementById('sig-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

// ── Save / Load invoices → Firestore ──────────────────
function setSyncing(on) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + (on ? 'syncing' : 'synced');
}

function collectData() {
  const rows = [];
  document.querySelectorAll('#items-body tr').forEach(row => {
    const qty  = row.querySelector('.qty-input').value;
    const desc = row.querySelector('.desc-input').value;
    const each = row.querySelector('.each-input').value;
    const gst  = row.querySelector('.gst-input-cell').value;
    if (qty || desc || each) rows.push({ qty, desc, each, gst });
  });
  return {
    docType,
    date:       document.getElementById('inv-date').value,
    order:      document.getElementById('inv-order').value,
    from:       document.getElementById('from-addr').value,
    to:         document.getElementById('to-addr').value,
    abnS:       document.getElementById('abn-supplier').value,
    abnR:       document.getElementById('abn-recipient').value,
    gstNo:      document.getElementById('gst-no').value,
    rows,
    subtotal:   document.getElementById('subtotal').textContent,
    gstTotal:   document.getElementById('gst-total').textContent,
    grandTotal: document.getElementById('grand-total').textContent,
    sig:        document.getElementById('sig-canvas').toDataURL(),
    savedAt:    new Date().toISOString(),
    convertedToInvoice: false
  };
}

function lsGetAll() {
  try { return JSON.parse(localStorage.getItem('invoices_local') || '[]'); } catch(e) { return []; }
}
function lsSaveAll(arr) {
  localStorage.setItem('invoices_local', JSON.stringify(arr));
}

async function saveInvoice() {
  setSyncing(true);
  const data = collectData();
  const all  = lsGetAll();

  try {
    if (currentInvoiceId) {
      const idx = all.findIndex(d => d.id === currentInvoiceId);
      if (idx !== -1) { all[idx] = { ...all[idx], ...data, savedAt: new Date().toISOString() }; }
    } else {
      const sameType = all.filter(d => (d.docType||'invoice') === docType);
      const num    = String(sameType.length + 1).padStart(6, '0');
      const prefix = docType === 'quote' ? 'QT' : 'JP';
      data.number = num;
      data.prefix = prefix;
      document.getElementById('inv-num').textContent    = num;
      document.getElementById('inv-prefix').textContent = prefix;
      currentInvoiceId = 'local_' + Date.now();
      data.id = currentInvoiceId;
      all.unshift(data);
    }
    lsSaveAll(all);
    setSyncing(false);
    const label = docType === 'quote' ? 'Quote' : 'Invoice';
    const num   = document.getElementById('inv-num').textContent;
    const pre   = document.getElementById('inv-prefix').textContent;
    showToast('✓ ' + label + ' ' + pre + num + ' saved');
    updateConvertBanner();
    loadSavedList();
  } catch (err) {
    setSyncing(false);
    showToast('Save failed: ' + err.message);
  }
}

async function loadInvoice(id) {
  try {
    const all  = lsGetAll();
    const data = all.find(d => d.id === id);
    if (!data) return;
    currentInvoiceId = id;

    docType = data.docType || 'invoice';
    setMode(docType, true);
    document.getElementById('inv-num').textContent    = data.number || '------';
    document.getElementById('inv-prefix').textContent = data.prefix || (docType === 'quote' ? 'QT' : 'JP');
    document.getElementById('inv-date').value         = data.date   || '';
    document.getElementById('inv-order').value        = data.order  || '';
    document.getElementById('from-addr').value        = data.from   || '';
    document.getElementById('to-addr').value          = data.to     || '';
    document.getElementById('abn-supplier').value     = data.abnS   || '';
    document.getElementById('abn-recipient').value    = data.abnR   || '';
    document.getElementById('gst-no').value           = data.gstNo  || '';
    document.getElementById('subtotal').textContent   = data.subtotal   || '0.00';
    document.getElementById('gst-total').textContent  = data.gstTotal   || '0.00';
    document.getElementById('grand-total').textContent = data.grandTotal || '0.00';

    const tbody = document.getElementById('items-body');
    tbody.innerHTML = '';
    (data.rows || []).forEach(r => addRow(r.qty, r.desc, r.each, r.gst));
    while (tbody.children.length < 8) addRow();

    if (data.sig) {
      const canvas = document.getElementById('sig-canvas');
      const img = new Image();
      img.onload = () => canvas.getContext('2d').drawImage(img, 0, 0);
      img.src = data.sig;
    }

    const label = docType === 'quote' ? 'Quote' : 'Invoice';
    showToast(label + ' ' + (data.prefix||'JP') + data.number + ' loaded');
    updateConvertBanner();
    toggleDrawer(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    showToast('Load failed: ' + err.message);
  }
}

async function deleteInvoice(id, label) {
  if (!confirm('Delete ' + label + '?')) return;
  const all = lsGetAll().filter(d => d.id !== id);
  lsSaveAll(all);
  if (currentInvoiceId === id) {
    currentInvoiceId = null;
    newInvoice(true);
  }
  loadSavedList();
  showToast('Deleted');
}

function newInvoice(silent) {
  if (!silent && !confirm('Start a new document? Unsaved changes will be lost.')) return;
  currentInvoiceId = null;
  ['inv-order','from-addr','to-addr','abn-recipient','gst-no'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  setTodayDate();
  document.getElementById('items-body').innerHTML = '';
  for (let i = 0; i < 8; i++) addRow();
  clearSig();
  calcTotals();
  generateDocNumber();
  updateConvertBanner();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (!silent) showToast('New ' + (docType === 'quote' ? 'quote' : 'invoice') + ' started');
}

async function loadSavedList() {
  const el = document.getElementById('saved-list');
  try {
    const all = lsGetAll();
    if (!all.length) {
      el.innerHTML = '<div class="empty-saved">No saved documents yet.</div>';
      return;
    }
    el.innerHTML = all.map(inv => {
      const isQuote     = (inv.docType || 'invoice') === 'quote';
      const isConverted = inv.convertedToInvoice;
      const prefix      = inv.prefix || (isQuote ? 'QT' : 'JP');
      const badgeClass  = isConverted ? 'badge-converted' : (isQuote ? 'badge-quote' : 'badge-invoice');
      const badgeText   = isConverted ? 'CONVERTED' : (isQuote ? 'QUOTE' : 'INVOICE');
      const numColor    = isQuote ? 'color:#C47A00' : 'color:var(--red)';
      const convertBtn  = isQuote && !isConverted
        ? `<button class="saved-load" style="background:#1A5C3A" onclick="convertSavedToInvoice('${inv.id}')">⚡ Convert</button>` : '';
      const savedDate   = inv.savedAt ? new Date(inv.savedAt).toLocaleDateString() : '';
      return `
      <div class="saved-item">
        <div>
          <div style="font-weight:700;${numColor}">${prefix} ${inv.number||'---'} <span class="status-badge ${badgeClass}">${badgeText}</span></div>
          <div class="saved-item-meta">${inv.date||''} · To: ${(inv.to||'').split('\n')[0]||'—'}</div>
          <div class="saved-item-meta">Total: $${inv.grandTotal||'0.00'} · Saved: ${savedDate}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${convertBtn}
          <button class="saved-load" onclick="loadInvoice('${inv.id}')">Load</button>
          <button class="saved-delete" onclick="deleteInvoice('${inv.id}','${prefix} ${inv.number||''}')">✕</button>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    el.innerHTML = '<div class="empty-saved">Error loading: ' + err.message + '</div>';
  }
}

// ── Quote → Invoice conversion ─────────────────────────
async function convertToInvoice() {
  if (docType !== 'quote') return;
  if (!confirm('Convert this Quote to a Tax Invoice?\n\nA new invoice number will be assigned and it becomes a legally valid Tax Invoice.')) return;

  // Mark original quote as converted
  if (currentInvoiceId) {
    const all = lsGetAll();
    const idx = all.findIndex(d => d.id === currentInvoiceId);
    if (idx !== -1) {
      all[idx].convertedToInvoice = true;
      all[idx].convertedAt = new Date().toISOString();
      lsSaveAll(all);
    }
  }

  const oldNum = document.getElementById('inv-num').textContent;
  currentInvoiceId = null;
  docType = 'invoice';
  setMode('invoice', true);
  setTodayDate();
  showToast('Quote QT' + oldNum + ' → converting to Invoice…');
  updateConvertBanner();
  await saveInvoice();
  loadSavedList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function convertSavedToInvoice(id) {
  if (!confirm('Load this Quote and convert it to a Tax Invoice?')) return;
  await loadInvoice(id);
  setTimeout(() => { if (docType === 'quote') convertToInvoice(); }, 300);
}

// ── PDF generation (jsPDF) ────────────────────────────
async function buildPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  const W = 210, margin = 14;
  let y = margin;

  const inkR = 45, inkG = 45, inkB = 122;   // --ink
  const lineR = 200, lineG = 200, lineB = 220;
  const redR  = 192, redG  = 57,  redB  = 43;

  function inkColor()  { doc.setTextColor(inkR, inkG, inkB); }
  function grayColor() { doc.setTextColor(100, 100, 130); }
  function redColor()  { doc.setTextColor(redR, redG, redB); }
  function lineColor() { doc.setDrawColor(lineR, lineG, lineB); }
  function inkLine()   { doc.setDrawColor(inkR, inkG, inkB); }

  // ─ Logo ─
  const logoSrc = document.getElementById('logo-img').src;
  const hasLogo = document.getElementById('logo-img').style.display !== 'none' && logoSrc;
  if (hasLogo) {
    try { doc.addImage(logoSrc, 'PNG', margin, y, 30, 18, undefined, 'FAST'); } catch(e) {}
  }

  // ─ Company details (right) ─
  const coName  = document.getElementById('co-name').value    || '';
  const coAbn   = document.getElementById('co-abn-top').value || '';
  const coAddr  = document.getElementById('co-addr').value    || '';
  const coPhone = document.getElementById('co-phone').value   || '';
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11); inkColor();
  doc.text(coName,  W - margin, y + 4,  { align: 'right' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); grayColor();
  if (coAbn)   { y += 5; doc.text(coAbn,   W - margin, y + 4,  { align: 'right' }); }
  if (coAddr)  { y += 4; doc.text(coAddr,  W - margin, y + 4,  { align: 'right' }); }
  if (coPhone) { y += 4; doc.text(coPhone, W - margin, y + 4,  { align: 'right' }); }
  y = margin + 22;

  // ─ Title banner ─
  const isQuote = docType === 'quote';
  const titleText = isQuote ? 'QUOTE / ESTIMATE' : 'TAX INVOICE / STATEMENT';
  if (isQuote) { doc.setDrawColor(26, 92, 58); doc.setTextColor(26, 92, 58); }
  else { inkLine(); inkColor(); }
  doc.setLineWidth(0.4);
  doc.rect(margin, y, W - margin * 2, 10);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(14);
  doc.text(titleText, W / 2, y + 6.8, { align: 'center' });
  y += 14;

  // ─ Meta row: Date | Order | Invoice No ─
  inkLine(); doc.setLineWidth(0.3);
  const cellW = (W - margin * 2) / 3;
  doc.rect(margin,          y, cellW,     12);
  doc.rect(margin + cellW,  y, cellW,     12);
  doc.rect(margin + cellW*2,y, cellW,     12);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(6); grayColor();
  doc.text('DATE',         margin + 2,          y + 3.5);
  doc.text('ORDER NUMBER', margin + cellW + 2,  y + 3.5);
  doc.text('INVOICE NUMBER', margin + cellW*2 + 2, y + 3.5);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); inkColor();
  doc.text(document.getElementById('inv-date').value  || '', margin + 2,          y + 9);
  doc.text(document.getElementById('inv-order').value || '', margin + cellW + 2,  y + 9);
  const prefix = document.getElementById('inv-prefix').textContent;
  const num    = document.getElementById('inv-num').textContent;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
  if (isQuote) doc.setTextColor(196, 122, 0); else redColor();
  doc.text(prefix + ' ' + num, margin + cellW*2 + 2, y + 9);
  y += 16;

  // ─ FROM / TO ─
  inkLine(); doc.setLineWidth(0.3);
  const halfW = (W - margin * 2) / 2;
  doc.rect(margin,        y, halfW, 22);
  doc.rect(margin + halfW, y, halfW, 22);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(6); grayColor();
  doc.text('FROM', margin + 2,        y + 3.5);
  doc.text('TO',   margin + halfW + 2, y + 3.5);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); inkColor();
  const fromLines = (document.getElementById('from-addr').value || '').split('\n').slice(0,3);
  const toLines   = (document.getElementById('to-addr').value   || '').split('\n').slice(0,3);
  fromLines.forEach((l, i) => doc.text(l, margin + 2,         y + 7 + i * 4));
  toLines.forEach((l,   i) => doc.text(l, margin + halfW + 2, y + 7 + i * 4));
  y += 26;

  // ─ ABN row ─
  doc.rect(margin, y, halfW, 7);
  doc.rect(margin + halfW, y, halfW, 7);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(6); grayColor();
  doc.text('ABN (Supplier): ', margin + 2, y + 4.5);
  doc.text('ABN (Recipient): ', margin + halfW + 2, y + 4.5);
  doc.setFont('helvetica', 'normal'); inkColor();
  doc.text(document.getElementById('abn-supplier').value  || '', margin + 26,        y + 4.5);
  doc.text(document.getElementById('abn-recipient').value || '', margin + halfW + 28, y + 4.5);
  y += 11;

  // ─ Items table header ─
  const cols = { qty: 14, desc: 82, each: 24, gst: 20, total: 26 };
  const colX = {
    qty:   margin,
    desc:  margin + cols.qty,
    each:  margin + cols.qty + cols.desc,
    gst:   margin + cols.qty + cols.desc + cols.each,
    total: margin + cols.qty + cols.desc + cols.each + cols.gst
  };
  const tableW = W - margin * 2;

  inkLine(); doc.setLineWidth(0.3);
  doc.setFillColor(245, 240, 192);
  doc.rect(margin, y, tableW, 7, 'FD');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(7); inkColor();
  doc.text('QTY',         colX.qty   + cols.qty/2,   y + 4.5, { align: 'center' });
  doc.text('DESCRIPTION', colX.desc  + 2,             y + 4.5);
  doc.text('EACH $',      colX.each  + cols.each/2,   y + 4.5, { align: 'center' });
  doc.text('GST',         colX.gst   + cols.gst/2,    y + 4.5, { align: 'center' });
  doc.text('TOTAL $',     colX.total + cols.total/2,  y + 4.5, { align: 'center' });
  y += 7;

  // ─ Items rows ─
  const rows = [];
  document.querySelectorAll('#items-body tr').forEach(row => {
    const qty  = row.querySelector('.qty-input').value;
    const desc = row.querySelector('.desc-input').value;
    const each = row.querySelector('.each-input').value;
    const gst  = row.querySelector('.gst-input-cell').value;
    const tot  = row.querySelector('.total-input').value;
    if (qty || desc || each) rows.push({ qty, desc, each, gst, tot });
  });

  const rowH = 7;
  rows.forEach((r, i) => {
    if (i % 2 === 1) {
      doc.setFillColor(248, 248, 255);
      doc.rect(margin, y, tableW, rowH, 'F');
    }
    lineColor(); doc.setLineWidth(0.2);
    doc.line(margin, y + rowH, margin + tableW, y + rowH);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); inkColor();
    doc.text(r.qty  || '', colX.qty   + cols.qty/2,   y + 4.8, { align: 'center' });
    doc.text(r.desc || '', colX.desc  + 2,             y + 4.8);
    doc.text(r.each || '', colX.each  + cols.each - 2, y + 4.8, { align: 'right' });
    grayColor();
    doc.text(r.gst  || '', colX.gst   + cols.gst  - 2, y + 4.8, { align: 'right' });
    doc.setFont('helvetica', 'bold'); inkColor();
    doc.text(r.tot  || '', colX.total + cols.total - 2, y + 4.8, { align: 'right' });
    y += rowH;
  });

  // ─ Column dividers ─
  inkLine(); doc.setLineWidth(0.3);
  const tableTop = y - rows.length * rowH - 7;
  [colX.desc, colX.each, colX.gst, colX.total].forEach(x => {
    doc.line(x, tableTop, x, y);
  });
  doc.rect(margin, tableTop, tableW, y - tableTop);
  y += 4;

  // ─ Totals (right-aligned block) ─
  const totW = 80, totX = W - margin - totW;
  const totRows = [
    ['Sub Total',          document.getElementById('subtotal').textContent],
    ['GST (10%)',          document.getElementById('gst-total').textContent],
    ['TOTAL INC. GST',     document.getElementById('grand-total').textContent],
  ];
  totRows.forEach((row, i) => {
    const rowY = y + i * 8;
    const isGrand = i === 2;
    if (isGrand) {
      doc.setFillColor(245, 240, 192);
      doc.rect(totX, rowY, totW, 9, 'FD');
    }
    inkLine(); doc.setLineWidth(0.25);
    doc.rect(totX, rowY, totW, isGrand ? 9 : 7);
    doc.line(totX + 52, rowY, totX + 52, rowY + (isGrand ? 9 : 7));
    doc.setFont('helvetica', isGrand ? 'bold' : 'normal');
    doc.setFontSize(isGrand ? 8 : 7.5);
    if (isGrand) { if (isQuote) doc.setTextColor(196,122,0); else redColor(); }
    else inkColor();
    doc.text(row[0], totX + 2,  rowY + (isGrand ? 6 : 5));
    doc.text('$' + row[1], totX + totW - 2, rowY + (isGrand ? 6 : 5), { align: 'right' });
  });
  y += 30;

  // ─ Signature ─
  const sigCanvas = document.getElementById('sig-canvas');
  const sigBlank  = !sigCanvas.getContext('2d')
    .getImageData(0,0,sigCanvas.width,sigCanvas.height).data.some(v => v !== 0);
  inkLine(); doc.setLineWidth(0.3);
  doc.rect(margin, y, 80, 22);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5); grayColor();
  doc.text('SIGNED:', margin + 2, y + 4);
  if (!sigBlank) {
    try { doc.addImage(sigCanvas.toDataURL(), 'PNG', margin + 2, y + 5, 76, 15, undefined, 'FAST'); } catch(e) {}
  }

  // ─ Footer note ─
  doc.setFont('helvetica', 'normal'); doc.setFontSize(7); grayColor();
  doc.text('* Indicates taxable supply', margin, y + 27);

  // ─ Pay status watermark ─
  if (payStatus === 'paid') {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(52);
    doc.setTextColor(16, 185, 129); doc.setGState(new doc.GState({ opacity: 0.12 }));
    doc.text('PAID', W/2, 160, { align:'center', angle: 30 });
    doc.setGState(new doc.GState({ opacity: 1 }));
  } else if (payStatus === 'overdue') {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(52);
    doc.setTextColor(239, 68, 68); doc.setGState(new doc.GState({ opacity: 0.12 }));
    doc.text('OVERDUE', W/2, 160, { align:'center', angle: 30 });
    doc.setGState(new doc.GState({ opacity: 1 }));
  }

  return doc;
}

async function downloadPDF() {
  showPDFLoading('Generating PDF…');
  try {
    const doc = await buildPDF();
    const prefix = document.getElementById('inv-prefix').textContent;
    const num    = document.getElementById('inv-num').textContent;
    doc.save(`${prefix}${num}_invoice.pdf`);
    closeSendModal();
    showToast('PDF downloaded ✓');
  } catch(e) {
    showToast('PDF error: ' + e.message);
  } finally {
    hidePDFLoading();
  }
}

function showPDFLoading(msg) {
  document.getElementById('pdf-loading-text').textContent = msg || 'Working…';
  document.getElementById('pdf-loading').classList.add('show');
}
function hidePDFLoading() {
  document.getElementById('pdf-loading').classList.remove('show');
}

// ── Email (EmailJS) ───────────────────────────────────
// ════════════════════════════════════════════════════
//  Set up EmailJS free at https://emailjs.com
//  1. Create account → Add Email Service (Gmail etc)
//  2. Create Email Template — use variables:
//     {{to_email}}, {{subject}}, {{message}},
//     {{from_name}}, {{invoice_number}}, {{pdf_base64}}
//  3. Paste your IDs below
// ════════════════════════════════════════════════════
const EMAILJS_CONFIG = {
  publicKey:   'PASTE_YOUR_PUBLIC_KEY',
  serviceId:   'PASTE_YOUR_SERVICE_ID',
  templateId:  'PASTE_YOUR_TEMPLATE_ID'
};

async function sendByEmail() {
  const to      = document.getElementById('send-email').value.trim();
  const subject = document.getElementById('send-subject').value.trim();
  const message = document.getElementById('send-message').value.trim();
  if (!to) { showToast('Enter a recipient email'); return; }

  showPDFLoading('Preparing email…');
  try {
    // Generate PDF as base64
    const doc      = await buildPDF();
    const pdfB64   = doc.output('datauristring');
    const coName   = document.getElementById('co-name').value || 'Invoice';
    const prefix   = document.getElementById('inv-prefix').textContent;
    const num      = document.getElementById('inv-num').textContent;

    if (EMAILJS_CONFIG.publicKey === 'PASTE_YOUR_PUBLIC_KEY') {
      // Fallback: open mail client
      hidePDFLoading();
      const mailto = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message + '\n\n(Download your PDF from the link the sender will attach separately)')}`;
      window.location.href = mailto;
      showToast('Opening mail app — attach the downloaded PDF');
      closeSendModal();
      return;
    }

    emailjs.init(EMAILJS_CONFIG.publicKey);
    await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
      to_email:       to,
      subject:        subject,
      message:        message,
      from_name:      coName,
      invoice_number: prefix + num,
      pdf_base64:     pdfB64
    });

    // Log sent info locally
    if (currentInvoiceId) {
      const all = lsGetAll();
      const idx = all.findIndex(d => d.id === currentInvoiceId);
      if (idx !== -1) {
        all[idx].lastSentTo = to;
        all[idx].lastSentAt = new Date().toISOString();
        all[idx].sentCount  = (all[idx].sentCount || 0) + 1;
        lsSaveAll(all);
      }
    }

    closeSendModal();
    showToast('Email sent to ' + to + ' ✓');
    loadSavedList();
  } catch(e) {
    showToast('Email error: ' + (e.text || e.message || 'Unknown error'));
  } finally {
    hidePDFLoading();
  }
}

// ── WhatsApp share ────────────────────────────────────
function sendByWhatsApp() {
  const prefix    = document.getElementById('inv-prefix').textContent;
  const num       = document.getElementById('inv-num').textContent;
  const coName    = document.getElementById('co-name').value   || 'Us';
  const toName    = (document.getElementById('to-addr').value  || '').split('\n')[0] || 'there';
  const grand     = document.getElementById('grand-total').textContent;
  const date      = document.getElementById('inv-date').value  || '';
  const type      = docType === 'quote' ? 'Quote' : 'Invoice';

  const msg =
`Hi ${toName},

Please find your ${type} details below:

${type} No: ${prefix} ${num}
Date: ${date}
From: ${coName}
Total: $${grand} (inc. GST)

Items:
` + (() => {
      const lines = [];
      document.querySelectorAll('#items-body tr').forEach(row => {
        const qty  = row.querySelector('.qty-input').value;
        const desc = row.querySelector('.desc-input').value;
        const tot  = row.querySelector('.total-input').value;
        if (desc || qty) lines.push(`• ${qty ? qty + 'x ' : ''}${desc} — $${tot}`);
      });
      return lines.join('\n');
    })() +
`

Thank you for your business! 🙏
${coName}`;

  // First download the PDF so they can attach it manually
  buildPDF().then(doc => {
    doc.save(`${prefix}${num}_invoice.pdf`);
    setTimeout(() => {
      const waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
      window.open(waUrl, '_blank');
      closeSendModal();
      showToast('PDF saved — attach it in WhatsApp ✓');
    }, 500);
  }).catch(() => {
    const waUrl = 'https://wa.me/?text=' + encodeURIComponent(msg);
    window.open(waUrl, '_blank');
    closeSendModal();
  });
}
function toggleDrawer(forceState) {
  const d = document.getElementById('saved-drawer');
  const arrow = document.getElementById('drawer-arrow');
  const isOpen = typeof forceState === 'boolean' ? !forceState : d.classList.contains('open');
  d.classList.toggle('open', !isOpen);
  arrow.textContent = isOpen ? '▼' : '▲';
  if (!isOpen) loadSavedList();
}

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
